name: Package Gerador OS (Portátil)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package portable distribution
        run: |
          mkdir -p dist/gerador-os
          cp main.py dist/gerador-os/
          cp iniciar.bat dist/gerador-os/
          cp requirements.txt dist/gerador-os/
          cd dist
          zip -r gerador-os-portatil.zip gerador-os/

      - uses: actions/upload-artifact@v4
        with:
          name: gerador-os-portatil
          path: dist/gerador-os-portatil.zip
